name: Deploy Dev

on:
  push:
    branches: [dev]
    paths:
      - "Sistema-Gestiones-Internas-Infraestructura-main/backend/app/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build y push imagen dev
        run: |
          gcloud builds submit \
            --tag gcr.io/essential-haiku-482815-u4/infraestructura-gestioninterna-dev \
            Sistema-Gestiones-Internas-Infraestructura-main/backend/app/

      - name: Deploy Cloud Run dev
        run: |
          gcloud run deploy infraestructura-gestioninterna-dev \
            --image gcr.io/essential-haiku-482815-u4/infraestructura-gestioninterna-dev \
            --platform managed \
            --region southamerica-east1 \
            --allow-unauthenticated \
            --set-env-vars "GCP_PROJECT=essential-haiku-482815-u4,BQ_DATASET=infra_gestion_dev,GOOGLE_CLIENT_ID=354063050046-fkp06ao8aauems1gcj4hlngljf56o3cj.apps.googleusercontent.com,ALLOW_INSECURE_LOCAL=true" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 60
